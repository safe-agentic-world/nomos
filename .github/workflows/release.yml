name: Release

on:
  repository_dispatch:
    types:
      - publish-release
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (for example v0.0.1)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.client_payload.tag || github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "repository_dispatch" ]]; then
            tag="${{ github.event.client_payload.tag }}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${tag}"
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ steps.meta.outputs.tag }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.13"
          cache: true

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ROOT_DIR="${PWD}"
          mkdir -p dist
          VERSION="${{ steps.meta.outputs.tag }}"
          COMMIT="$(git rev-parse --short=12 HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          : > dist/nomos-checksums.txt
          for target in \
            "linux amd64 tar.gz" \
            "linux arm64 tar.gz" \
            "darwin amd64 tar.gz" \
            "darwin arm64 tar.gz" \
            "windows amd64 zip" \
            "windows arm64 zip"; do
            read -r GOOS_TARGET GOARCH_TARGET PACKAGE_FORMAT <<<"${target}"
            STAGE_DIR="$(mktemp -d)"
            BIN_NAME="nomos"
            if [[ "${GOOS_TARGET}" == "windows" ]]; then
              BIN_NAME="nomos.exe"
            fi
            GOOS="${GOOS_TARGET}" GOARCH="${GOARCH_TARGET}" \
              go build -ldflags "-X github.com/safe-agentic-world/nomos/internal/version.Version=${VERSION} -X github.com/safe-agentic-world/nomos/internal/version.Commit=${COMMIT} -X github.com/safe-agentic-world/nomos/internal/version.BuildDate=${BUILD_DATE}" \
              -o "${STAGE_DIR}/${BIN_NAME}" ./cmd/nomos
            OUT="dist/nomos-${GOOS_TARGET}-${GOARCH_TARGET}.${PACKAGE_FORMAT}"
            if [[ "${PACKAGE_FORMAT}" == "zip" ]]; then
              (cd "${STAGE_DIR}" && zip -q "${ROOT_DIR}/${OUT}" "${BIN_NAME}")
            else
              tar -C "${STAGE_DIR}" -czf "${OUT}" "${BIN_NAME}"
            fi
            (cd dist && sha256sum "nomos-${GOOS_TARGET}-${GOARCH_TARGET}.${PACKAGE_FORMAT}") >> dist/nomos-checksums.txt
            rm -rf "${STAGE_DIR}"
          done

      - name: Install supply-chain tooling
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/anchore/syft/cmd/syft@v1.24.0
          go install github.com/sigstore/cosign/v2/cmd/cosign@v2.4.1

      - name: Generate SBOM
        shell: bash
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/syft" packages dir:dist -o spdx-json > dist/nomos-sbom.spdx.json

      - name: Generate provenance
        shell: bash
        run: |
          set -euo pipefail
          python -c "exec(\"import glob, hashlib, json, os\\nfiles = []\\nfor path in sorted(glob.glob('dist/nomos-*')):\\n    name = os.path.basename(path)\\n    if name.endswith('.sig') or name.endswith('.pem'):\\n        continue\\n    digest = hashlib.sha256()\\n    with open(path, 'rb') as handle:\\n        digest.update(handle.read())\\n    files.append({'name': name, 'digest': {'sha256': digest.hexdigest()}})\\nstatement = {'_type': 'https://in-toto.io/Statement/v0.1', 'predicateType': 'https://slsa.dev/provenance/v1', 'subject': files, 'predicate': {'buildDefinition': {'buildType': 'https://github.com/safe-agentic-world/nomos/.github/workflows/release.yml', 'externalParameters': {'tag': '${{ steps.meta.outputs.tag }}'}, 'internalParameters': {'go_version': '1.24.13'}, 'resolvedDependencies': [{'uri': 'git+https://github.com/${{ github.repository }}@${{ github.sha }}'}]}, 'runDetails': {'builder': {'id': 'https://github.com/${{ github.repository }}/.github/workflows/release.yml'}, 'metadata': {'invocationId': '${{ github.run_id }}', 'sourceRepositoryDigest': '${{ github.sha }}'}}}}\\nwith open('dist/nomos-provenance.intoto.jsonl', 'w', encoding='utf-8') as handle:\\n    handle.write(json.dumps(statement, sort_keys=True, separators=(',', ':')) + '\\\\n')\")"

      - name: Sign release assets
        shell: bash
        run: |
          set -euo pipefail
          COSIGN_BIN="$(go env GOPATH)/bin/cosign"
          for file in \
            dist/nomos-*.tar.gz \
            dist/nomos-*.zip \
            dist/nomos-checksums.txt \
            dist/nomos-sbom.spdx.json \
            dist/nomos-provenance.intoto.jsonl; do
            "${COSIGN_BIN}" sign-blob --yes --output-signature "${file}.sig" --output-certificate "${file}.pem" "${file}"
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: dist/*
          generate_release_notes: true

      - name: Update Homebrew and Scoop manifests
        if: ${{ github.event_name == 'repository_dispatch' }}
        env:
          PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN }}
          PACKAGES_REPO: safe-agentic-world/packages-nomos
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          CHECKSUM_FILE: ${{ github.workspace }}/dist/nomos-checksums.txt
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/update-packages-repo.sh
