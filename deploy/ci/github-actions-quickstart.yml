name: nomos-quickstart

on:
  workflow_dispatch:

jobs:
  quickstart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Build Nomos
        run: go build -o ./bin/nomos ./cmd/nomos

      - name: Doctor Preflight
        run: ./bin/nomos doctor -c ./examples/quickstart/config.quickstart.json --format json

      - name: Deterministic Allow And Deny
        run: |
          ./bin/nomos policy test --action ./examples/quickstart/actions/allow-readme.json --bundle ./examples/policies/safe.yaml
          ./bin/nomos policy test --action ./examples/quickstart/actions/deny-env.json --bundle ./examples/policies/safe.yaml

      - name: Fail Closed On Invalid Config
        run: |
          cp ./examples/quickstart/config.quickstart.json ./examples/quickstart/config.invalid.json
          python -c "import json; path='./examples/quickstart/config.invalid.json'; data=json.load(open(path, 'r', encoding='utf-8')); data['policy']['policy_bundle_path']='./missing.yaml'; json.dump(data, open(path, 'w', encoding='utf-8'))"
          if ./bin/nomos doctor -c ./examples/quickstart/config.invalid.json --format json; then
            echo "expected invalid config to fail closed"
            exit 1
          fi
